<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto | TOMÉDELUXE</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">TOMÉ<span>DELUXE</span></div>
    </nav>

    <main class="container" style="display: flex; justify-content: center; padding-top: 4rem;">
        <section class="card" style="width: 100%; max-width: 600px;">
            <div style="margin-bottom: 25px;">
                <h3 style="font-size: 1.5rem; color: var(--dark-bg);">
                    <i class="fa-solid fa-pen-to-square" style="display: inline; font-size: 1.2rem; margin-right: 10px;"></i>
                    Editar Produto
                </h3>
                <p style="font-size: 0.85rem; color: #94A3B8;">Alterando registro: #{{ produto.id }}</p>
            </div>

            <form action="/produtos/{{ produto.id }}/editar" method="POST">
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" name="nome" value="{{ produto.nome }}" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Preço Unitário (R$)</label>
                        <input type="number" step="0.01" name="preco" value="{{ produto.preco }}" required>
                    </div>
                    <div class="form-group">
                        <label>Quantidade em Estoque</label>
                        <input type="number" name="estoque" value="{{ produto.estoque }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select name="categoria_id" required>
                        {% for categoria in categorias %}
                        <option value="{{ categoria.id }}" 
                            {% if categoria.id == produto.categoria_id %} selected {% endif %}>
                            {{ categoria.nome }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn btn-main" style="flex: 2; justify-content: center;">
                        Atualizar Produto
                    </button>
                    <a href="/produtos" class="btn" style="flex: 1; justify-content: center; background: #F1F5F9; color: #64748B;">
                        Voltar
                    </a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        &copy; 2026 TOMÉDELUXE — AMBIENTE DE GESTÃO SOLICITADO
    </footer>

</body>
</html>
